name: Check upstream model configs

on:
  schedule:
    - cron: '17 6 * * *' # 06:17 UTC daily
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Regenerate models.json from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: npm run fetch-models
      - name: Fail if upstream configs have drifted
        run: |
          if ! git diff --quiet -- src/data/models.json; then
            echo "::error::Upstream config.json has changed for one or more models. Re-run 'npm run fetch-models' locally and commit the diff."
            git --no-pager diff -- src/data/models.json
            exit 1
          fi
