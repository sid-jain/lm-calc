<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <title>LM Calc — Open-weight LLM hardware calculator</title>
    <meta
      name="description"
      content="Pick a RAM budget, context length, and quantization. See which Llama, Qwen, Gemma, Mistral, Phi, and DeepSeek models actually fit, with weights / KV cache / overhead breakdowns derived from each model's HuggingFace config.json."
    />
    <link rel="canonical" href="https://lmcalc.app/" />

    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />

    <meta property="og:title" content="LM Calc — Open-weight LLM hardware calculator" />
    <meta
      property="og:description"
      content="Pick a RAM budget, context length, and quantization. See which open-weight LLMs actually fit, with honest weights / KV / overhead breakdowns."
    />
    <meta property="og:url" content="https://lmcalc.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LM Calc" />
    <meta property="og:image" content="https://lmcalc.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LM Calc — Open-weight LLM hardware calculator" />
    <meta
      name="twitter:description"
      content="Pick a RAM budget, context length, and quantization. See which open-weight LLMs actually fit."
    />
    <meta name="twitter:image" content="https://lmcalc.app/og.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "LM Calc",
        "url": "https://lmcalc.app/",
        "description": "Pick a RAM budget, context length, and quantization. See which open-weight LLMs (Llama, Qwen, Gemma, Mistral, Phi, DeepSeek) actually fit, with weights / KV / overhead breakdowns derived from each model's HuggingFace config.json.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
